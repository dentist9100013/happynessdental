<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診所班表</title>
<style>
:root {
  --bg: #e6e7ee;
  --surface: #e6e7ee;
  --surface-tinted: #ecedf3;
  --border: rgba(255,255,255,0.46);
  --text: #2d3142;
  --text-muted: #5d6477;
  --primary: #d97706;
  --primary-dark: #b45309;
  --primary-soft: #f5dfc3;
  --rest: #b91c1c;
  --rest-soft: #ead5d6;
  --rest-text: #7f1d1d;
  --extra: #d97706;
  --extra-soft: #f0dec5;
  --extra-text: #7c3f05;
  --shadow-dark: #b5b9c5;
  --shadow-light: #ffffff;
  --shadow-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
  --shadow-md: 9px 9px 18px var(--shadow-dark), -9px -9px 18px var(--shadow-light);
  --shadow-lg: 14px 14px 30px var(--shadow-dark), -14px -14px 30px var(--shadow-light);
  --shadow-in: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
  --shadow-in-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
  --radius-sm: 12px;
  --radius: 22px;
  --radius-lg: 32px;
  --radius-pill: 999px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 16px;
  text-wrap: pretty;
}
.app { max-width: 1600px; margin: 0 auto; padding: 32px 24px 68px; }
body.is-assistant .app { max-width: 1800px; }
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 28px;
  padding: 24px 28px;
  background: var(--bg);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
}
h1 {
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 700;
  letter-spacing: 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
h1::before {
  content: "";
  width: 12px;
  height: 34px;
  background: var(--primary);
  border-radius: var(--radius-pill);
  box-shadow: var(--shadow-sm);
}
.picker-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.picker-row label { font-size: 14px; color: var(--text-muted); font-weight: 500; }
select {
  font-family: inherit;
  font-size: 15px;
  padding: 10px 16px;
  border: 0;
  border-radius: var(--radius-pill);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  outline: none;
  box-shadow: var(--shadow-in-sm);
  transition: box-shadow 0.18s, color 0.18s;
  min-width: 200px;
}
select:hover { color: var(--primary-dark); }
select:focus { box-shadow: var(--shadow-in), 0 0 0 3px rgba(217,119,6,0.18); }

/* 身分切換按鈕 */
.role-switch {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 0;
  border-radius: var(--radius-pill);
  padding: 6px;
  box-shadow: var(--shadow-in-sm);
}
.role-btn {
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 18px;
  border: none;
  border-radius: var(--radius-pill);
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  transition: box-shadow 0.18s, background 0.18s, color 0.18s;
}
.role-btn.active {
  background: var(--bg);
  color: var(--primary-dark);
  box-shadow: var(--shadow-sm);
}
.role-btn:not(.active):hover { color: var(--primary-dark); }

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  padding: 18px 22px;
  border: 0;
  border-radius: var(--radius-lg);
  margin-bottom: 22px;
  box-shadow: var(--shadow-md);
  flex-wrap: wrap;
  gap: 12px;
}
.month-nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.month-nav .nav-arrow {
  font-family: inherit;
  width: 40px;
  height: 40px;
  border: 0;
  background: var(--surface);
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  color: var(--text);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.18s, color 0.18s;
  flex-shrink: 0;
}
.month-nav .nav-arrow:hover { color: var(--primary-dark); box-shadow: var(--shadow-md); }
.month-nav .nav-arrow:active { box-shadow: var(--shadow-in-sm); }
.month-label { font-size: 18px; font-weight: 700; min-width: 140px; text-align: center; color: var(--text); }

/* 全月休假 / 清除我的當月 / 管理員 按鈕共用基底 */
.toolbar-action-btn {
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 9px 16px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: box-shadow 0.18s, color 0.18s, background 0.18s;
  white-space: nowrap;
  display: none;
  align-items: center;
  gap: 5px;
  border: 0;
  box-shadow: var(--shadow-sm);
}
.toolbar-action-btn.visible { display: inline-flex; }

/* 全月休假（紅） */
.btn-full-month-rest {
  background: var(--bg);
  color: var(--rest-text);
}
.btn-full-month-rest:hover { background: var(--rest); color: white; box-shadow: var(--shadow-md); }
.btn-full-month-rest:active { box-shadow: var(--shadow-in-sm); }

/* 清除我的當月（灰） */
.btn-clear-my-month {
  background: var(--surface);
  color: var(--text-muted);
}
.btn-clear-my-month:hover { color: var(--text); box-shadow: var(--shadow-md); }
.btn-clear-my-month:active { box-shadow: var(--shadow-in-sm); }

/* 只看我（綠色切換） */
.btn-only-me {
  background: var(--surface);
  color: var(--primary-dark);
}
.btn-only-me:hover { box-shadow: var(--shadow-md); }
.btn-only-me.on { background: var(--primary); color: white; box-shadow: var(--shadow-in-sm); }

/* 管理員（深灰，永遠顯示） */
.btn-admin {
  background: var(--bg);
  color: var(--text);
  display: inline-flex !important;
}
.btn-admin:hover { color: var(--primary-dark); box-shadow: var(--shadow-md); }

/* 助理模式：休假欄改兩欄 chip grid */
.day .zone.rest-zone.asst-grid {
  display: flex;
  flex-direction: column;
  gap: 1px;
  overflow: visible;
}
.asst-chip-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px 4px;
  overflow: visible;
}

/* Admin Modal */
.admin-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(45,49,66,0.34);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
  padding: 20px;
}
.admin-modal-backdrop.show { opacity: 1; pointer-events: all; }
.admin-modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-lg);
  transform: scale(0.95);
  transition: transform 0.18s;
  overflow: hidden;
}
.admin-modal-backdrop.show .admin-modal { transform: scale(1); }
.admin-modal-header {
  background: var(--bg);
  color: var(--text);
  padding: 18px 24px;
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.admin-modal-body { padding: 22px; }
.admin-modal-body label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  margin-top: 14px;
}
.admin-modal-body label:first-child { margin-top: 0; }
.admin-input {
  font-family: inherit;
  font-size: 15px;
  width: 100%;
  padding: 11px 14px;
  border: 0;
  border-radius: var(--radius-sm, 12px);
  outline: none;
  background: var(--bg);
  box-shadow: var(--shadow-in-sm);
  transition: box-shadow 0.15s;
}
.admin-input:focus { box-shadow: var(--shadow-in), 0 0 0 3px rgba(217,119,6,0.16); }
.admin-role-select {
  font-family: inherit;
  font-size: 15px;
  width: 100%;
  padding: 11px 14px;
  border: 0;
  border-radius: var(--radius-sm, 12px);
  outline: none;
  background: var(--surface);
  box-shadow: var(--shadow-in-sm);
  cursor: pointer;
}
.admin-error {
  font-size: 12px;
  color: var(--rest);
  margin-top: 6px;
  min-height: 16px;
  font-weight: 600;
}
.admin-modal-footer {
  padding: 14px 22px;
  border-top: 0;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.legend { display: flex; gap: 14px; font-size: 13px; color: var(--text-muted); flex-wrap: wrap; }
.legend span { display: flex; align-items: center; gap: 6px; }
.legend i {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  box-shadow: var(--shadow-sm);
  display: inline-block;
}
.legend .l-rest { background: var(--rest); }
.legend .l-extra { background: var(--extra); }
.legend .l-holiday {
  background: var(--bg);
  box-shadow: var(--shadow-in-sm);
}
.legend i[style*="linear-gradient"] {
  background: var(--bg) !important;
  border: 0 !important;
  box-shadow: var(--shadow-in-sm);
}
#adminConfirm {
  background: var(--rest) !important;
  color: white !important;
  border-color: transparent !important;
}
#adminConfirm:hover {
  background: #991b1b !important;
  box-shadow: var(--shadow-md);
}
.summary-table tr[style*="background:#f0fdfa"] td {
  background: var(--surface-tinted) !important;
}

.calendar-wrap {
  position: relative;
  background: var(--surface);
  border: 0;
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-md);
}
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
.weekday {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 10px 0;
  letter-spacing: 0.08em;
}
.weekday.sun { color: var(--rest); }
.weekday.sat { color: var(--primary); }

.day {
  min-height: 130px;
  border: 0;
  border-radius: 18px;
  cursor: pointer;
  position: relative;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  transition: transform 0.16s, box-shadow 0.16s, color 0.16s;
  user-select: none;
  overflow: visible;   /* 允許助理兩欄超出時自動撐高 */
  display: flex;
  flex-direction: column;
}
/* 助理模式：日期格子允許自由撐高 */
body.is-assistant .day { overflow: visible; height: auto; }
.day .zones {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 8px 8px;
  min-height: 0;
}
/* 助理模式：只有休假一欄，全寬 */
.day .zones.single-zone {
  grid-template-columns: 1fr;
}
.day:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.day.empty {
  background: transparent;
  border: 0;
  box-shadow: none;
  cursor: default;
  min-height: 0;
}
.day.empty:hover { transform: none; box-shadow: none; border-color: transparent; }

.day .num {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  padding: 10px 12px 6px;
  line-height: 1.1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 4px;
}
.day .num .holiday-name {
  font-size: 10px;
  color: var(--rest);
  font-weight: 600;
  letter-spacing: 0.02em;
}
.day.is-holiday .num span:first-child { color: var(--rest); }
.day.is-holiday { background: var(--surface); }
.holiday-art {
  position: absolute;
  right: 10px;
  bottom: 10px;
  width: 42px;
  height: 42px;
  border-radius: 15px 18px 13px 20px;
  background: var(--bg);
  box-shadow: var(--shadow-sm);
  display: grid;
  place-items: center;
  pointer-events: none;
  z-index: 0;
  transform: rotate(-3deg);
}
.holiday-art::before,
.holiday-art::after {
  content: "";
  position: absolute;
  border-radius: inherit;
  inset: 5px;
  background: rgba(255,255,255,0.42);
  box-shadow: var(--shadow-in-sm);
}
.holiday-art::after {
  content: attr(data-icon);
  inset: auto;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--paper-accent, var(--primary));
  color: white;
  box-shadow: 3px 3px 7px rgba(181,185,197,0.72), -3px -3px 7px rgba(255,255,255,0.86);
  font-size: 16px;
  font-weight: 800;
  line-height: 1;
}
.holiday-art.new-year { --paper-accent: #d97706; border-radius: 50%; }
.holiday-art.lunar { --paper-accent: #b91c1c; border-radius: 16px; }
.holiday-art.peace { --paper-accent: #4f5470; }
.holiday-art.tomb { --paper-accent: #15803d; border-radius: 22px 14px 22px 14px; }
.holiday-art.children { --paper-accent: #0d9488; border-radius: 50% 42% 50% 44%; }
.holiday-art.labor { --paper-accent: #475569; border-radius: 12px; }
.holiday-art.dragon { --paper-accent: #047857; border-radius: 50% 18px 50% 18px; }
.holiday-art.moon { --paper-accent: #ca8a04; border-radius: 50%; }
.holiday-art.national { --paper-accent: #b91c1c; border-radius: 12px 18px 12px 18px; }
.holiday-art.default { --paper-accent: var(--primary); }
.holiday-art.has-image {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  padding: 4px;
  overflow: hidden;
}
.holiday-art.has-image::before,
.holiday-art.has-image::after {
  display: none;
}
.holiday-art.has-image img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  border-radius: 50%;
  box-shadow: var(--shadow-in-sm);
}
.day .zone,
.day .num {
  position: relative;
  z-index: 1;
}
.day .num .you {
  font-size: 9px;
  font-weight: 700;
  background: var(--bg);
  color: var(--primary-dark);
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  box-shadow: var(--shadow-in-sm);
  letter-spacing: 0.05em;
}
.day.today .num { color: var(--primary); }
.day.today { box-shadow: var(--shadow-in-sm); }

.day .zone {
  padding: 7px 8px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-height: 0;
  overflow: hidden;
  border-radius: 14px;
}
body.is-assistant .day .zone { overflow: visible; }
.day .zone.empty-zone { background: transparent; }
.day .zone-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  align-self: flex-start;
  margin-bottom: 2px;
}
.day .zone-label.rest-label { background: var(--bg); color: var(--rest-text); box-shadow: var(--shadow-in-sm); }
.day .zone-label.extra-label { background: var(--bg); color: var(--extra-text); box-shadow: var(--shadow-in-sm); }
.day.has-rest .zone.rest-zone { background: var(--bg); box-shadow: var(--shadow-in-sm); }
.day.has-extra .zone.extra-zone { background: var(--bg); box-shadow: var(--shadow-in-sm); }

.doctor-chip {
  font-size: 10.5px;
  line-height: 1.3;
  padding: 3px 7px;
  border-radius: var(--radius-pill);
  font-weight: 500;
  display: block;
  background: rgba(255,255,255,0.24);
  box-shadow: inset 1px 1px 2px rgba(181,185,197,0.55), inset -1px -1px 2px rgba(255,255,255,0.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* 助理模式：名字不截斷，單行顯示 */
body.is-assistant .doctor-chip {
  white-space: nowrap;
  overflow: visible;
  text-overflow: unset;
  font-size: 11px;
}

/* ===== 當月休假彙整表 ===== */
.summary-section {
  margin-top: 28px;
  display: block;
}

.summary-section h2 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text);
  flex-wrap: wrap;
}
.summary-view-toggle {
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  border: 0;
  background: var(--surface);
  color: var(--primary-dark);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: all 0.15s;
  display: none;
  white-space: nowrap;
}
.summary-view-toggle:hover { box-shadow: var(--shadow-md); }
.summary-view-toggle.active { background: var(--primary); color: white; box-shadow: var(--shadow-in-sm); }
.summary-section h2::before {
  content: "";
  width: 5px;
  height: 18px;
  background: var(--rest);
  border-radius: 3px;
  display: inline-block;
}

.summary-table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 0;
  box-shadow: var(--shadow-md);
}
.summary-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  background: var(--surface);
}
.summary-table th {
  background: var(--bg);
  font-weight: 700;
  padding: 9px 12px;
  text-align: center;
  border-bottom: 0;
  color: var(--text-muted);
  font-size: 12px;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.summary-table th.name-col {
  text-align: left;
  min-width: 90px;
  color: var(--text);
}
.summary-table td {
  padding: 7px 12px;
  border-bottom: 1px solid rgba(181,185,197,0.36);
  vertical-align: middle;
  text-align: center;
  white-space: nowrap;
}
.summary-table td.name-cell {
  text-align: left;
  font-weight: 600;
  color: var(--text);
}
.summary-table tr:last-child td { border-bottom: none; }
.summary-table tr:hover td { background: var(--surface-tinted); }

/* 休假標記 */
.rest-badge {
  display: inline-block;
  background: var(--bg);
  color: var(--rest-text);
  border-radius: var(--radius-pill);
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  line-height: 1.6;
  margin: 1px 2px;
  box-shadow: var(--shadow-in-sm);
}
.rest-badge.full { background: var(--rest); color: white; box-shadow: var(--shadow-sm); }

.summary-empty {
  text-align: center;
  color: var(--text-muted);
  font-style: italic;
  padding: 24px;
  font-size: 13px;
}
.doctor-chip.rest { color: var(--rest-text); }
.doctor-chip.extra { color: var(--extra-text); }
.doctor-chip.is-me { font-weight: 700; }
.doctor-chip.is-me .name { text-decoration: underline; text-underline-offset: 2px; }
.doctor-chip .slot {
  font-size: 9px;
  font-weight: 600;
  opacity: 0.7;
  margin-left: 3px;
}
.day .zone .more-tag {
  font-size: 9.5px;
  color: var(--text-muted);
  padding: 1px 5px;
  font-weight: 600;
}

/* 遮罩 */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(230,231,238,0.82);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  border-radius: var(--radius);
  z-index: 10;
}
.overlay-card {
  background: var(--surface);
  border: 0;
  padding: 24px 32px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  text-align: center;
}
.overlay-card .icon {
  width: 44px;
  height: 44px;
  margin: 0 auto 10px;
  background: var(--bg);
  color: var(--primary-dark);
  border-radius: 50%;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
}
.overlay-card h3 { font-size: 17px; margin-bottom: 4px; }
.overlay-card p { font-size: 13px; color: var(--text-muted); }

.status-bar {
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.status-bar .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #d1d5db;
  display: inline-block;
}
.status-bar .dot.connected {
  background: #10b981;
  box-shadow: 0 0 0 5px rgba(16,185,129,0.16);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);

function switchRole(role) {
  currentRole = role;
  currentPerson = "";
  scheduleData = {};
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }

  if (role === "doctor") {
    roleDoctorBtn.classList.add("active");
    roleAssistantBtn.classList.remove("active");
    pageTitle.textContent = "診所醫師班表";
    overlayTitle.textContent = "請先選擇醫師身分";
    overlayDesc.textContent = "選擇上方下拉選單，才能開始編輯班表";
    legendEl.innerHTML = `
      <span><i class="l-rest"></i>休診</span>
      <span><i class="l-extra"></i>加診</span>
      <span><i style="background: linear-gradient(180deg, #fff5f5 0%, var(--surface) 100%); border:1px solid #fecaca;"></i>國定假日</span>
      <span style="color: var(--text-muted)">時段：早 / 午 / 晚 / 全</span>
    `;
    othersLabel.textContent = "當天其他醫師";
    btnFullMonthRest.classList.remove("visible");
    btnClearMyMonth.classList.remove("visible");
    btnExportAssistantLeave.classList.remove("visible");
    btnOnlyMe.classList.remove("visible");
  } else {
    roleDoctorBtn.classList.remove("active");
    roleAssistantBtn.classList.add("active");
    pageTitle.textContent = "診所助理班表";
    overlayTitle.textContent = "請先選擇助理身分";
    overlayDesc.textContent = "選擇上方下拉選單，才能開始編輯班表";
    legendEl.innerHTML = `
      <span><i class="l-rest"></i>休假</span>
      <span><i style="background: linear-gradient(180deg, #fff5f5 0%, var(--surface) 100%); border:1px solid #fecaca;"></i>國定假日</span>
      <span style="color: var(--text-muted)">時段：早 / 午 / 晚 / 全</span>
    `;
    othersLabel.textContent = "當天其他助理";
    btnFullMonthRest.classList.add("visible");
    btnClearMyMonth.classList.add("visible");
    btnExportAssistantLeave.classList.add("visible");
    btnOnlyMe.classList.add("visible");
  }

  // 重設篩選狀態
  summaryMyOnly = false;
  summaryViewToggle.textContent = "只看我";
  summaryViewToggle.classList.remove("active");
  calendarMyOnly = false;
  btnOnlyMe.textContent = "只看我";
  btnOnlyMe.classList.remove("on");

  // body class 讓 CSS 知道目前是助理模式
  if (role === "assistant") {
    document.body.classList.add("is-assistant");
  } else {
    document.body.classList.remove("is-assistant");
  }

  populateSelect(role);
  overlay.style.display = "flex";
  renderCalendar();   // 立刻渲染框架（scheduleData 已清空，格子正常，遮罩蓋住等選人）
  startSync();        // Firebase 連線後再更新資料
}

btnFullMonthRest.addEventListener("click", async () => {
  if (currentRole !== "assistant") return;
  if (!currentPerson) {
    showToast("請先選擇助理身分");
    return;
  }
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthStr = `${year} 年 ${month + 1} 月`;

  const confirmed = confirm(`將「${currentPerson}」整個 ${monthStr} 的所有日期設為全天休假，確定嗎？`);
  if (!confirmed) return;

  showToast("寫入中，請稍候…");
  btnFullMonthRest.disabled = true;

  const colRef = SCHEDULE_COL_ASSISTANT;
  const allRest = { am: "rest", pm: "rest", ev: "rest" };

  try {
    const writes = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = fmtDate(new Date(year, month, d));
      const docRef = doc(colRef, dateStr);
      writes.push(
        setDoc(docRef, {
          entries: { [currentPerson]: allRest },
          ts: serverTimestamp()
        }, { merge: true })
      );

    await Promise.all(writes);

    // 寫一筆歷史紀錄代表整月操作

      date: `${year}-${String(month + 1).padStart(2, "0")}-全月`,

      action: "全月休假",
      ts: serverTimestamp()

  } catch (err) {
    console.error(err);
    showToast("設定失敗：" + err.message);

function getHappynessAssistantId(displayName) {
  const en = asstShortName(displayName).toLowerCase();
  return HAPPINESS_ASSISTANT_ID_BY_EN[en] || en;
}

function buildAssistantLeaveTransferJSON() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const astLeave = {};
  const assistants = ASSISTANTS.map(a => ({
    en: a.en,
    zh: a.zh,
    displayName: assistantDisplayName(a),
    happynessId: getHappynessAssistantId(assistantDisplayName(a))
  }));

  let recordCount = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = fmtDate(new Date(year, month, d));
    const entries = scheduleData[dateStr]?.entries || {};
    assistants.forEach(a => {
      const raw = entries[a.displayName];
      const entry = (typeof raw === "string") ? { am: raw, pm: raw, ev: raw } : raw;
      if (!entry) return;

      const leaveSlots = SLOTS.map(s => entry[s] === "rest" ? 1 : 0);
      if (!leaveSlots.some(Boolean)) return;

      if (!astLeave[a.happynessId]) astLeave[a.happynessId] = {};
      astLeave[a.happynessId][`${year}-${month}-${d}`] = leaveSlots;
      recordCount++;
    });
  }

  return {
    version: "clinic-assistant-leave-v1",
    source: "clinic-calendar.html",
    target: "happyness_v11.html",
    mode: "overwrite-month-assistant-leave",
    year,
    month: month + 1,
    monthIndex: month,
    exportedAt: new Date().toISOString(),
    assistants,
    astLeave,
    recordCount
  };
}

function downloadJSON(data, filename) {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

btnExportAssistantLeave.addEventListener("click", () => {
  if (currentRole !== "assistant") return;
  const data = buildAssistantLeaveTransferJSON();
  if (!data.recordCount) {
    showToast("本月沒有可匯出的助理休假資料");
    return;
  }

  const mm = String(data.month).padStart(2, "0");
  downloadJSON(data, `clinic-assistant-leave_${data.year}-${mm}.json`);
  showToast(`已匯出 ${data.recordCount} 筆助理休假資料`);
});

// ----- 工具函式 -----
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function isSameDate(a, b) {
  return a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
}
function getPersonEntry(dateStr, personName) {
  const e = scheduleData[dateStr]?.entries?.[personName];
  if (!e) return null;
  if (typeof e === "string") return { am: e, pm: e, ev: e };
  return { am: e.am || "", pm: e.pm || "", ev: e.ev || "" };
}
function slotsToShort(slots) {
  if (slots.length === 3) return "全";
  return slots.map(s => SLOT_LABEL[s]).join("");

// ----- 渲染月曆 -----
function renderCalendar() {
  const isAssistant = currentRole === "assistant";
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  monthLabel.textContent = `${year} 年 ${month + 1} 月`;

  // 有選人就確保遮罩隱藏
  if (currentPerson) overlay.style.display = "none";

  Array.from(calendarEl.querySelectorAll(".day")).forEach(el => el.remove());

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    const ph = document.createElement("div");
    ph.className = "day empty";
    calendarEl.appendChild(ph);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const dateStr = fmtDate(dateObj);
    const cell = document.createElement("div");
    cell.className = "day";
    cell.dataset.date = dateStr;
    if (isSameDate(dateObj, today)) cell.classList.add("today");

    const holidayName = HOLIDAYS[dateStr];
    if (holidayName) cell.classList.add("is-holiday");

    const entries = scheduleData[dateStr]?.entries || {};
    const restList = [];
    const extraList = [];
    Object.entries(entries).forEach(([name, raw]) => {
      // 助理「只看我」模式：跳過不是自己的人
      if (isAssistant && calendarMyOnly && name !== currentPerson) return;
      const e = (typeof raw === "string") ? { am: raw, pm: raw, ev: raw } : raw;
      const restSlots = SLOTS.filter(s => e[s] === "rest");
      const extraSlots = SLOTS.filter(s => e[s] === "extra");
      if (restSlots.length > 0) restList.push({ name, slots: restSlots });
      if (extraSlots.length > 0) extraList.push({ name, slots: extraSlots });
    });

    if (restList.length > 0) cell.classList.add("has-rest");
    if (extraList.length > 0) cell.classList.add("has-extra");

    // 日期數字 + 假日 + 我的徽章
    const numEl = document.createElement("div");
    numEl.className = "num";
    const numTxt = document.createElement("span");
    numTxt.textContent = d;
    numEl.appendChild(numTxt);

    if (holidayName) {
      const hol = document.createElement("span");
      hol.className = "holiday-name";
      hol.textContent = holidayName;
      hol.title = `國定假日：${holidayName}`;
      numEl.appendChild(hol);
    }

    if (currentPerson) {
      const myEntry = entries[currentPerson];
      const myE = (typeof myEntry === "string") ? { am: myEntry, pm: myEntry, ev: myEntry } : myEntry;
      if (myE) {
        const hasRest = SLOTS.some(s => myE[s] === "rest");
        const hasExtra = SLOTS.some(s => myE[s] === "extra");
        if (hasRest || hasExtra) {
          const meTag = document.createElement("span");
          meTag.className = "you";
          let txt = "";
          if (isAssistant) {
            if (hasRest) txt = "我休";
          } else {
            if (hasRest) txt = "我休";
            if (hasExtra) txt = (txt ? "我休加" : "我加");
          }
          meTag.textContent = txt;
          numEl.appendChild(meTag);
        }
      }
    }
    cell.appendChild(numEl);

    if (holidayName) {
      const art = getHolidayPaperArt(dateStr, holidayName);
      const artEl = document.createElement("div");
      artEl.className = `holiday-art ${art.type}`;
      artEl.dataset.icon = art.icon;
      artEl.title = art.label;
      artEl.setAttribute("aria-hidden", "true");
      if (art.image) {
        artEl.classList.add("has-image");
        const img = document.createElement("img");
        img.src = art.image;
        img.alt = "";
        img.loading = "lazy";
        img.addEventListener("error", () => {
          artEl.classList.remove("has-image");
          img.remove();
        });
        artEl.appendChild(img);
      }
      cell.appendChild(artEl);
    }

    // 左右欄（助理模式只顯示休假區，佔全寬）
    const zones = document.createElement("div");
    zones.className = isAssistant ? "zones single-zone" : "zones";

    // 休診/休假欄
    const restZone = document.createElement("div");
    restZone.className = "zone rest-zone";
    if (restList.length === 0) restZone.classList.add("empty-zone");
    if (restList.length > 0) {
      const lbl = document.createElement("div");
      lbl.className = "zone-label rest-label";
      lbl.textContent = isAssistant ? "休假" : "休診";
      restZone.appendChild(lbl);
    }

    const MAX_VISIBLE = 3;

    if (isAssistant) {
      // 助理：全部顯示，兩欄 grid
      const chipGrid = document.createElement("div");
      chipGrid.className = "asst-chip-grid";
      restList.forEach(({ name, slots }) => {
        const chip = document.createElement("div");
        chip.className = "doctor-chip rest";
        if (name === currentPerson) chip.classList.add("is-me");
        const enName = asstShortName(name);
        chip.innerHTML = `<span class="name">${enName}</span><span class="slot">${slotsToShort(slots)}</span>`;
        chip.title = `${name}（${slots.map(s => SLOT_FULL_LABEL[s]).join("、")}休假）`;
        chipGrid.appendChild(chip);
      });
      restZone.appendChild(chipGrid);
    } else {
      // 醫師：原本邏輯，最多顯示 3 個
      const restToShow = restList.slice(0, MAX_VISIBLE);
      const restRest = restList.length - restToShow.length;
      restToShow.forEach(({ name, slots }) => {
        const chip = document.createElement("div");
        chip.className = "doctor-chip rest";
        if (name === currentPerson) chip.classList.add("is-me");
        chip.innerHTML = `<span class="name">${shortName(name)}</span><span class="slot">${slotsToShort(slots)}</span>`;
        chip.title = `${name}（${slots.map(s => SLOT_FULL_LABEL[s]).join("、")}休診）`;
        restZone.appendChild(chip);
      });
      if (restRest > 0) {
        const more = document.createElement("div");
        more.className = "more-tag";
        more.textContent = `+${restRest} 人`;
        more.title = restList.slice(MAX_VISIBLE).map(({name, slots}) => `${name}（${slotsToShort(slots)}）`).join("、");
        restZone.appendChild(more);
      }
    }
    zones.appendChild(restZone);

    // 加診欄（僅醫師模式）
    if (!isAssistant) {
      const extraZone = document.createElement("div");
      extraZone.className = "zone extra-zone";
      if (extraList.length === 0) extraZone.classList.add("empty-zone");
      if (extraList.length > 0) {
        const lbl = document.createElement("div");
        lbl.className = "zone-label extra-label";
        lbl.textContent = "加診";
        extraZone.appendChild(lbl);
      }
      const extraToShow = extraList.slice(0, MAX_VISIBLE);
      const extraRest = extraList.length - extraToShow.length;
      extraToShow.forEach(({ name, slots }) => {
        const chip = document.createElement("div");
        chip.className = "doctor-chip extra";
        if (name === currentPerson) chip.classList.add("is-me");
        chip.innerHTML = `<span class="name">${shortName(name)}</span><span class="slot">${slotsToShort(slots)}</span>`;
        chip.title = `${name}（${slots.map(s => SLOT_FULL_LABEL[s]).join("、")}加診）`;
        extraZone.appendChild(chip);
      });
      if (extraRest > 0) {
        const more = document.createElement("div");
        more.className = "more-tag";
        more.textContent = `+${extraRest} 人`;
        more.title = extraList.slice(MAX_VISIBLE).map(({name, slots}) => `${name}（${slotsToShort(slots)}）`).join("、");
        extraZone.appendChild(more);
      }
      zones.appendChild(extraZone);
    }

    cell.appendChild(zones);
    cell.addEventListener("click", () => openModal(dateStr));
    calendarEl.appendChild(cell);
  }

  renderSummary();
}

// ----- 當月彙整表 -----
function renderSummary() {
  const isAssistant = currentRole === "assistant";
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const summaryContent = document.getElementById("summaryContent");
  const summaryTitle = document.getElementById("summaryTitle");

  const restWord = isAssistant ? "休假" : "休診";
  summaryTitle.textContent = `${year} 年 ${month + 1} 月　${isAssistant ? "助理" : "醫師"}${restWord}彙整`;

  // 只有助理模式且已選身分才顯示「只看我」按鈕
  summaryViewToggle.style.display = (isAssistant && currentPerson) ? "inline-block" : "none";

  // 收集每人的休假日資訊
  // personMap: { name -> { restDays: [{day, slots}], extraDays: [{day, slots}] } }
  const personMap = {};

  const nameList = isAssistant
    ? ASSISTANTS.map(a => assistantDisplayName(a))
    : DOCTORS;

  // 先把所有人初始化（確保無資料的人也在表格裡）
  nameList.forEach(n => { personMap[n] = { restDays: [], extraDays: [] }; });

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = fmtDate(new Date(year, month, d));
    const entries = scheduleData[dateStr]?.entries || {};
    Object.entries(entries).forEach(([name, raw]) => {
      if (!personMap[name]) return; // 不在名單的忽略
      const e = (typeof raw === "string") ? { am: raw, pm: raw, ev: raw } : raw;
      const restSlots = SLOTS.filter(s => e[s] === "rest");
      const extraSlots = SLOTS.filter(s => e[s] === "extra");
      if (restSlots.length > 0) personMap[name].restDays.push({ day: d, slots: restSlots });
      if (extraSlots.length > 0) personMap[name].extraDays.push({ day: d, slots: extraSlots });
    });
  }

  // 篩選顯示名單：助理模式可切換「只看我」
  const displayList = (isAssistant && summaryMyOnly && currentPerson)
    ? nameList.filter(n => n === currentPerson)
    : nameList;

  // 找出有任何資料的人
  const hasData = displayList.some(n =>
    personMap[n]?.restDays.length > 0 || personMap[n]?.extraDays.length > 0
  );

  if (!hasData) {
    const noDataMsg = (isAssistant && summaryMyOnly)
      ? "本月尚無你的休假資料"
      : `本月尚無${restWord}資料`;
    summaryContent.innerHTML = `<div class="summary-empty">${noDataMsg}</div>`;
    return;
  }

  // 建立表格：人名 | 休假天數 | 休假日期（帶時段標記）| [加診，醫師專用]
  let html = `<table class="summary-table">
    <thead><tr>
      <th class="name-col">${isAssistant ? "助理" : "醫師"}</th>
      <th>${restWord}天數</th>
      <th style="text-align:left; min-width:320px;">${restWord}日期</th>
      ${!isAssistant ? '<th>加診天數</th><th style="text-align:left; min-width:200px;">加診日期</th>' : ""}
    </tr></thead>
    <tbody>`;

  displayList.forEach(name => {
    const { restDays, extraDays } = personMap[name] || { restDays: [], extraDays: [] };
    if (restDays.length === 0 && extraDays.length === 0) return; // 沒資料就跳過

    const displayName = isAssistant ? asstShortName(name) : shortName(name);

    const weekdayMap = ["日", "一", "二", "三", "四", "五", "六"];

    const restBadges = restDays.map(({ day, slots }) => {
      const isFull = slots.length === 3;
      const slotText = isFull ? "" : `(${slots.map(s => SLOT_LABEL[s]).join("")})`;
      const wd = weekdayMap[new Date(year, month, day).getDay()];
      return `<span class="rest-badge${isFull ? " full" : ""}">${day}日(${wd})${slotText}</span>`;
    }).join("");

    const extraBadges = extraDays.map(({ day, slots }) => {
      const isFull = slots.length === 3;
      const slotText = isFull ? "" : `(${slots.map(s => SLOT_LABEL[s]).join("")})`;
      const wd = weekdayMap[new Date(year, month, day).getDay()];
      return `<span class="rest-badge" style="background:var(--extra-soft);color:var(--extra-text);">${day}日(${wd})${slotText}</span>`;
    }).join("");

    const isMe = name === currentPerson;
    html += `<tr${isMe ? ' style="background:#f0fdfa;"' : ""}>
      <td class="name-cell">${displayName}${isMe ? ' <span style="font-size:10px;background:var(--primary);color:white;padding:1px 5px;border-radius:3px;font-weight:700;">我</span>' : ""}</td>
      <td><strong style="color:var(--rest-text)">${restDays.length}</strong> 天</td>
      <td style="text-align:left;">${restBadges || "—"}</td>
      ${!isAssistant ? `<td><strong style="color:var(--extra-text)">${extraDays.length}</strong> 天</td><td style="text-align:left;">${extraBadges || "—"}</td>` : ""}
    </tr>`;
  });

  html += "</tbody></table>";
  summaryContent.innerHTML = html;
}

// ----- Modal 開啟 -----
function openModal(dateStr) {
  if (!currentPerson) {
    showToast(currentRole === "doctor" ? "請先選擇醫師身分" : "請先選擇助理身分");
    return;
  }
  const isAssistant = currentRole === "assistant";
  modalDateStr = dateStr;
  const my = getPersonEntry(dateStr, currentPerson) || { am: "", pm: "", ev: "" };
  modalDraft = { ...my };

  // 標題
  const [y, m, dv] = dateStr.split("-");
  const dateObj = new Date(+y, +m - 1, +dv);
  const weekdayMap = ["日", "一", "二", "三", "四", "五", "六"];
  const holidayName = HOLIDAYS[dateStr];
  const holidaySuffix = holidayName ? ` · ${holidayName}` : "";
  modalDate.textContent = `${+m} 月 ${+dv} 日（週${weekdayMap[dateObj.getDay()]}${holidaySuffix}）`;
  modalMeta.textContent = `身分：${currentPerson}`;

  // 快速按鈕區：助理模式只顯示全天休假 + 清除
  if (isAssistant) {
    quickActions.classList.add("assistant-mode");
    qFullRest.textContent = "全天休假";
    qFullExtra.style.display = "none";
    qClear.classList.add("full-width");
    qClear.classList.remove("clear");
    qClear.style.gridColumn = "";
    slotSectionTitle.textContent = "分時段設定（點切換：正常 → 休假）";
  } else {
    quickActions.classList.remove("assistant-mode");
    qFullRest.textContent = "全天休診";
    qFullExtra.style.display = "";
    qClear.classList.remove("full-width");
    qClear.classList.add("clear");
    qClear.style.gridColumn = "";
    slotSectionTitle.textContent = "分時段設定（點切換：正常 → 休診 → 加診）";
  }

  refreshSlotButtons();
  refreshOthersList(dateStr);
  modalBackdrop.classList.add("show");
}

function refreshSlotButtons() {
  const isAssistant = currentRole === "assistant";
  document.querySelectorAll(".slot-toggle").forEach(btn => {
    const slot = btn.dataset.slot;
    const status = modalDraft[slot] || "";
    btn.classList.remove("active", "rest", "extra");
    if (status === "rest") {
      btn.classList.add("active", "rest");
      btn.textContent = isAssistant ? "休假" : "休診";
    } else if (status === "extra" && !isAssistant) {
      btn.classList.add("active", "extra");
      btn.textContent = "加診";
    } else {
      btn.textContent = "正常";
    }
  });
}

function refreshOthersList(dateStr) {
  const isAssistant = currentRole === "assistant";
  const entries = scheduleData[dateStr]?.entries || {};
  const lines = [];
  Object.entries(entries).forEach(([name, raw]) => {
    if (name === currentPerson) return;
    const e = (typeof raw === "string") ? { am: raw, pm: raw, ev: raw } : raw;
    const restSlots = SLOTS.filter(s => e[s] === "rest").map(s => SLOT_FULL_LABEL[s]);
    const extraSlots = SLOTS.filter(s => e[s] === "extra").map(s => SLOT_FULL_LABEL[s]);
    if (restSlots.length === 0 && extraSlots.length === 0) return;
    let parts = [];
    const restWord = isAssistant ? "休假" : "休診";
    if (restSlots.length === 3) parts.push(`全天${restWord}`);
    else if (restSlots.length > 0) parts.push(restSlots.join("、") + restWord);
    if (!isAssistant) {
      if (extraSlots.length === 3) parts.push("全天加診");
      else if (extraSlots.length > 0) parts.push(extraSlots.join("、") + "加診");
    }
    lines.push(`<div class="row"><strong>${name}</strong>　${parts.join("，")}</div>`);
  });
  if (lines.length === 0) {
    othersList.classList.add("empty");
    othersList.innerHTML = isAssistant ? "目前無其他助理設定" : "目前無其他醫師設定";
  } else {
    othersList.classList.remove("empty");
    othersList.innerHTML = lines.join("");
  }
}

// 時段按鈕循環
document.querySelectorAll(".slot-toggle").forEach(btn => {
  btn.addEventListener("click", () => {
    const slot = btn.dataset.slot;
    const cycle = currentRole === "assistant" ? STATUS_CYCLE_ASSISTANT : STATUS_CYCLE_DOCTOR;
    const cur = modalDraft[slot] || "";
    const idx = cycle.indexOf(cur);
    modalDraft[slot] = cycle[(idx + 1) % cycle.length];
    refreshSlotButtons();
  });
});

// 快速按鈕
qFullRest.addEventListener("click", () => {
  modalDraft = { am: "rest", pm: "rest", ev: "rest" };
  refreshSlotButtons();
});
qFullExtra.addEventListener("click", () => {
  modalDraft = { am: "extra", pm: "extra", ev: "extra" };
  refreshSlotButtons();
});
qClear.addEventListener("click", () => {
  modalDraft = { am: "", pm: "", ev: "" };
  refreshSlotButtons();
});

// 取消 / 關閉
document.getElementById("modalCancel").addEventListener("click", closeModal);
modalBackdrop.addEventListener("click", e => {
  if (e.target === modalBackdrop) closeModal();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && modalBackdrop.classList.contains("show")) closeModal();
});
function closeModal() {
  modalBackdrop.classList.remove("show");
  modalDateStr = null;
}

// 儲存
document.getElementById("modalSave").addEventListener("click", saveModal);

async function saveModal() {
  if (!modalDateStr) return;
  const dateStr = modalDateStr;
  const before = getPersonEntry(dateStr, currentPerson) || { am: "", pm: "", ev: "" };
  const after = { ...modalDraft };

  const changed = SLOTS.some(s => (before[s] || "") !== (after[s] || ""));
  if (!changed) {
    showToast("沒有變更");
    closeModal();
    return;
  }

  const allEmpty = SLOTS.every(s => !after[s]);
  const colRef = currentRole === "assistant" ? SCHEDULE_COL_ASSISTANT : SCHEDULE_COL_DOCTOR;
  const docRef = doc(colRef, dateStr);

  try {
    if (allEmpty) {
      await setDoc(docRef, {
        entries: { [currentPerson]: deleteField() },
        ts: serverTimestamp()
      }, { merge: true });
    } else {
      await setDoc(docRef, {
        entries: { [currentPerson]: after },
        ts: serverTimestamp()
      }, { merge: true });
    }

    await addDoc(HISTORY_COL, {
      date: dateStr,
      person: currentPerson,
      role: currentRole,
      from: before,
      to: after,
      ts: serverTimestamp()
    });

    if (NOTIFY_WEBHOOK_URL) {
      const summary = formatChange(before, after);
      fetch(NOTIFY_WEBHOOK_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          date: dateStr,
          person: currentPerson,
          role: currentRole,
          from: before,
          to: after,
          summary,
          time: new Date().toISOString()
        })
      }).catch(err => console.warn("通知失敗", err));
    }

    showToast(`${currentPerson}：${dateStr} 已更新`);
    closeModal();
  } catch (err) {
    console.error(err);
    showToast("儲存失敗：" + err.message);
  }
}

function formatChange(before, after) {
  const isAssistant = currentRole === "assistant";
  const label = isAssistant ? STATUS_LABEL_ASST : STATUS_LABEL;
  const lines = [];
  SLOTS.forEach(s => {
    const b = before[s] || "";
    const a = after[s] || "";
    if (b !== a) {
      lines.push(`${SLOT_FULL_LABEL[s]}：${label[b] || b} → ${label[a] || a}`);
    }
  });
  return lines.join("；");
}

// ----- 即時同步 -----
function startSync() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  const colRef = currentRole === "assistant" ? SCHEDULE_COL_ASSISTANT : SCHEDULE_COL_DOCTOR;
  const syncRole = currentRole;   // 記住本次訂閱當下的角色
  unsubscribe = onSnapshot(colRef, snap => {
    // 如果角色已切換，此回呼屬於舊訂閱，忽略
    if (syncRole !== currentRole) return;
    scheduleData = {};
    snap.forEach(d => { scheduleData[d.id] = d.data(); });
    renderCalendar();
    setConnected(true);
    if (modalDateStr) refreshOthersList(modalDateStr);
  }, err => {
    if (syncRole !== currentRole) return;
    console.error("同步錯誤", err);
    setConnected(false);
    connLabel.textContent = "連線錯誤：" + err.message;
  });
}

function setConnected(ok) {
  if (ok) {
    connDot.classList.add("connected");
    connLabel.textContent = "已連線（即時同步中）";
  } else {
    connDot.classList.remove("connected");
  }
}

let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
}

// 初始化
populateSelect("doctor");
renderCalendar();   // 立刻顯示日曆框架
startSync();        // Firebase 連線後更新資料
</script>
